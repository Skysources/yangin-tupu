<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yangın Tüpleri Kontrol</title>
<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin:0; padding:0; }

:root {
  --ink: #1D1D1F;
  --gray: #6E6E73;
  --hairline: rgba(0,0,0,.08);
  --glass: rgba(255,255,255,.58);
  --glass-strong: rgba(255,255,255,.72);
  --green: #34C759;
  --green-deep: #248A3D;
  --red: #FF3B30;
  --red-deep: #D70015;
  --amber: #B25000;
  --blue: #0071E3;
  --r-lg: 22px;
  --r-md: 16px;
  --r-sm: 12px;
}

body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  color: var(--ink);
  background: linear-gradient(160deg, #EEF1F6 0%, #E8ECF3 40%, #EDEAF2 100%);
  padding-bottom: 80px;
  position: relative;
  overflow-x: hidden;
}

.blob { position: fixed; border-radius: 50%; filter: blur(90px); opacity: .5; pointer-events: none; z-index: 0; }
.b1 { width: 480px; height: 480px; background: #FFD6CF; top: -140px; right: -120px; }
.b2 { width: 420px; height: 420px; background: #CFE3FF; top: 30%; left: -160px; }
.b3 { width: 380px; height: 380px; background: #DFF5E1; bottom: -120px; right: 15%; }

/* TOPBAR */
.topBar {
  position: sticky; top: 0; z-index: 20;
  background: rgba(250,250,252,.65);
  -webkit-backdrop-filter: saturate(180%) blur(24px);
  backdrop-filter: saturate(180%) blur(24px);
  border-bottom: 0.5px solid var(--hairline);
}
.topInner { max-width: 1080px; margin: 0 auto; padding: 14px 18px 12px; }
.titleRow { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--gray); }
.title { margin: 1px 0 0; font-size: 26px; font-weight: 700; letter-spacing: -.4px; }

.monthPicker {
  display: flex; align-items: center; gap: 2px;
  background: rgba(120,120,128,.12); border-radius: 12px; padding: 3px;
}
.mBtn {
  width: 34px; height: 34px; border: none; border-radius: 9px; cursor: pointer;
  background: transparent; font-size: 20px; color: var(--blue); line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.mBtn:active { background: rgba(120,120,128,.16); }
.mLabel { min-width: 116px; text-align: center; font-weight: 600; font-size: 15px; }

.statRow { display: flex; align-items: center; gap: 14px; margin-top: 12px; }
.ring {
  width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
  background: conic-gradient(var(--green) var(--p, 0%), rgba(120,120,128,.15) 0);
  display: flex; align-items: center; justify-content: center; position: relative;
}
.ring::before { content: ""; position: absolute; inset: 6px; border-radius: 50%; background: rgba(250,250,252,.9); }
.ring span { position: relative; font-size: 13px; font-weight: 700; }
.statText { flex: 1; min-width: 0; }
.statBig { font-size: 17px; font-weight: 700; letter-spacing: -.2px; }
.statDim { font-weight: 500; color: var(--gray); font-size: 14px; }
.statSub { font-size: 13px; color: var(--gray); margin-top: 2px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.ok { background: var(--green); }
.dot.sorun { background: var(--red); }
.dot.bekliyor { background: rgba(120,120,128,.4); }

.addBtn {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  background: var(--blue); color: #fff; border: none; border-radius: 12px;
  padding: 9px 15px 9px 12px; cursor: pointer; font-family: inherit;
  font-size: 13.5px; font-weight: 600; box-shadow: 0 4px 14px rgba(0,113,227,.3);
  transition: transform .12s, filter .12s;
}
.addBtn:hover { filter: brightness(1.05); }
.addBtn:active { transform: scale(.97); }
.addPlus { font-size: 17px; font-weight: 700; line-height: 1; }

.controls { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.segment {
  display: flex; background: rgba(120,120,128,.12); border-radius: 11px; padding: 2.5px; gap: 2px;
}
.seg {
  border: none; background: transparent; cursor: pointer;
  font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--ink);
  padding: 7px 14px; border-radius: 9px; white-space: nowrap; transition: all .15s;
}
.segOn { background: rgba(255,255,255,.95); box-shadow: 0 1px 4px rgba(0,0,0,.12); }
.segOn.seg-ok { color: var(--green-deep); }
.segOn.seg-sorun { color: var(--red-deep); }

.search {
  flex: 1; min-width: 150px; padding: 9px 14px; font-size: 14px; font-family: inherit;
  border: none; border-radius: 11px; background: rgba(120,120,128,.12); color: var(--ink);
  outline: none; transition: background .15s, box-shadow .15s;
}
.search::placeholder { color: var(--gray); }
.search:focus { background: rgba(255,255,255,.9); box-shadow: 0 0 0 3px rgba(0,113,227,.25); }

/* GRID */
.grid {
  max-width: 1080px; margin: 18px auto 0; padding: 0 18px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px;
  position: relative; z-index: 1;
}
.empty { grid-column: 1/-1; text-align: center; color: var(--gray); padding: 48px 0; font-size: 15px; }

/* CARD */
.card {
  display: flex; align-items: center; gap: 13px; text-align: left;
  padding: 13px 14px; cursor: pointer; font-family: inherit; color: inherit;
  background: var(--glass);
  -webkit-backdrop-filter: blur(18px); backdrop-filter: blur(18px);
  border: 0.5px solid rgba(255,255,255,.7);
  border-radius: var(--r-md);
  box-shadow: 0 2px 10px rgba(30,35,50,.06);
  transition: transform .15s ease, box-shadow .15s ease;
  width: 100%;
}
.card:hover { transform: translateY(-2px) scale(1.005); box-shadow: 0 8px 24px rgba(30,35,50,.12); }
.card:active { transform: scale(.985); }
.card.sorun { background: rgba(255,235,233,.6); border-color: rgba(255,59,48,.25); }
.card.ok { border-color: rgba(52,199,89,.3); }

.badge {
  min-width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px;
  background: #F2F2F5; color: #6E6E73; border: 0.5px solid rgba(0,0,0,.07);
  overflow: hidden;
}
.badge.ok    { background: var(--green); color: #fff; border-color: transparent; box-shadow: 0 3px 10px rgba(52,199,89,.35); }
.badge.sorun { background: var(--red);   color: #fff; border-color: transparent; box-shadow: 0 3px 10px rgba(255,59,48,.35); }
.badge.bekliyor { background: #F2F2F5; color: #6E6E73; border-color: rgba(0,0,0,.07); }
.badge.big { min-width: 44px; height: 44px; font-size: 18px; border-radius: 12px; }
.badge-num { font-size: 8px; font-weight: 700; letter-spacing: 0; line-height: 1; color: currentColor; opacity: .85; }
.badge-img { width: 28px; height: 28px; object-fit: contain; object-position: center; display: block; margin: 0 auto; }
.badge-img.ok-img { filter: brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(90deg); }

.cardBody { flex: 1; min-width: 0; }
.cardLoc { font-weight: 600; font-size: 14px; letter-spacing: -.1px; line-height: 1.28; }
.cardMeta { display: flex; align-items: center; gap: 7px; margin-top: 3px; flex-wrap: wrap; font-size: 12px; color: var(--gray); font-weight: 500; }
.pill { font-size: 10.5px; font-weight: 700; padding: 2.5px 8px; border-radius: 999px; letter-spacing: .2px; }
.pillRed { background: rgba(255,59,48,.14); color: var(--red-deep); }
.pillAmber { background: rgba(255,159,10,.18); color: var(--amber); }
.mark { font-size: 17px; font-weight: 700; width: 22px; text-align: center; flex-shrink: 0; color: rgba(120,120,128,.5); }
.mark.ok { color: var(--green-deep); }
.mark.sorun { color: var(--red-deep); }

/* OVERLAY */
.overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(20,22,30,.35);
  -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn .18s ease;
}
.overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } }

/* SHEET */
.sheet {
  width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
  background: var(--glass-strong);
  -webkit-backdrop-filter: saturate(180%) blur(28px); backdrop-filter: saturate(180%) blur(28px);
  border: 0.5px solid rgba(255,255,255,.8);
  border-radius: 20px; padding: 14px 16px 20px;
  box-shadow: 0 24px 60px rgba(10,15,30,.3);
  animation: popIn .2s cubic-bezier(.32,1.25,.5,1);
}
@keyframes popIn { from { opacity: 0; transform: scale(.95); } }
.grabber { display: none; }

.sheetHead { display: flex; align-items: center; gap: 10px; }
.sheetLoc { font-weight: 700; font-size: 14px; letter-spacing: -.1px; line-height: 1.25; }
.sheetType { font-size: 11px; color: var(--gray); font-weight: 500; margin-top: 1px; }
.closeBtn, .iconBtn {
  width: 26px; height: 26px; border: none; border-radius: 50%; cursor: pointer; flex-shrink: 0;
  background: rgba(120,120,128,.14); color: var(--gray); font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.iconBtn { font-size: 13px; color: var(--blue); background: rgba(0,113,227,.1); }
.closeBtn:hover { background: rgba(120,120,128,.22); color: var(--ink); }
.iconBtn:hover { background: rgba(0,113,227,.18); }

.infoRow { display: flex; gap: 7px; margin-top: 10px; }
.infoBox {
  flex: 1; display: flex; flex-direction: column; gap: 1px;
  background: rgba(255,255,255,.5); border: 0.5px solid rgba(255,255,255,.7);
  border-radius: 9px; padding: 6px 10px;
}
.infoLbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--gray); }
.infoVal { font-weight: 700; font-size: 12px; }

.warnBand {
  margin-top: 7px; padding: 6px 10px; border-radius: 8px;
  background: rgba(255,59,48,.10); color: var(--red-deep);
  font-size: 11.5px; font-weight: 600; border: 0.5px solid rgba(255,59,48,.18);
}

.secTitle { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--gray); margin: 14px 0 6px; }

.checkGroup { display: flex; flex-direction: column; gap: 5px; }
.checkRow {
  display: flex; align-items: center; gap: 10px; padding: 8px 11px;
  font-size: 12.5px; background: rgba(255,255,255,.55);
  border: 0.5px solid rgba(255,255,255,.75);
  border-radius: 9px;
  transition: background .12s;
}
.checkRow:hover { background: rgba(255,255,255,.72); }
.checkLbl { flex: 1; font-weight: 500; font-size: 12.5px; }

.miniSeg { display: flex; background: rgba(120,120,128,.12); border-radius: 8px; padding: 2px; gap: 2px; flex-shrink: 0; }
.ms {
  border: none; background: transparent; cursor: pointer; font-family: inherit;
  font-size: 11px; font-weight: 700; color: var(--gray);
  padding: 4px 10px; border-radius: 6px; transition: all .12s;
}
.ms:hover { color: var(--ink); }
.msOk { background: var(--green); color: #fff; box-shadow: 0 1px 4px rgba(52,199,89,.4); }
.msOk:hover { color: #fff; }
.msBad { background: var(--red); color: #fff; box-shadow: 0 1px 4px rgba(255,59,48,.4); }
.msBad:hover { color: #fff; }

.note {
  width: 100%; margin-top: 8px; padding: 8px 10px; font-family: inherit; font-size: 12.5px;
  border: 0.5px solid rgba(255,255,255,.65); border-radius: 9px;
  background: rgba(255,255,255,.5); color: var(--ink); resize: vertical; outline: none;
  min-height: 54px;
}
.note::placeholder { color: var(--gray); }
.note:focus { background: rgba(255,255,255,.82); box-shadow: 0 0 0 2.5px rgba(0,113,227,.2); }

.btnRow { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
.saveBtn {
  flex: 1; min-width: 140px; padding: 10px 14px; border: none; border-radius: 11px; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 700; color: #fff;
  transition: transform .12s, filter .12s;
}
.saveBtn:active { transform: scale(.98); }
.saveOk { background: var(--green); box-shadow: 0 4px 12px rgba(52,199,89,.3); }
.saveOk:hover { filter: brightness(.95); }
.saveBad { background: var(--red); box-shadow: 0 4px 12px rgba(255,59,48,.3); }
.saveBad:hover { filter: brightness(.95); }
.delBtn {
  padding: 10px 13px; border-radius: 11px; cursor: pointer; font-family: inherit;
  font-size: 12px; font-weight: 600; color: var(--red-deep);
  background: rgba(255,59,48,.09); border: none;
}
.delBtn:hover { background: rgba(255,59,48,.15); }

.histEmpty { font-size: 12px; color: var(--gray); }
.histList { display: flex; flex-direction: column; gap: 3px; }
.histRow {
  display: flex; gap: 8px; align-items: flex-start; padding: 7px 10px;
  background: rgba(255,255,255,.48); border: 0.5px solid rgba(255,255,255,.62);
  border-radius: 8px;
}
.histMonth { font-weight: 600; font-size: 12.5px; }
.histOk { color: var(--green-deep); font-weight: 700; margin-left: 6px; font-size: 11.5px; }
.histBad { color: var(--red-deep); font-weight: 700; margin-left: 6px; font-size: 11.5px; }
.histIssues { font-size: 11px; color: var(--red-deep); margin-top: 1px; font-weight: 500; }
.histNote { font-size: 11.5px; color: var(--gray); margin-top: 1px; font-style: italic; }
.histDate { font-size: 10.5px; color: var(--gray); white-space: nowrap; padding-top: 2px; }

/* YILLIK KONTROL */
.yillik-band {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,.55);
  border: 0.5px solid rgba(255,255,255,.75);
  border-radius: 9px; padding: 8px 11px;
  margin-bottom: 5px;
}
.yillik-lbl { flex:1; font-size:12.5px; font-weight:600; }
.yillik-status {
  font-size: 11px; font-weight: 700; padding: 3px 9px;
  border-radius: 20px; flex-shrink: 0;
}
.ys-uygun    { background: var(--green); color: #fff; }
.ys-degil    { background: var(--red);   color: #fff; }
.ys-yok      { background: rgba(120,120,128,.15); color: var(--gray); }
.yillik-seg  { display:flex; background:rgba(120,120,128,.12); border-radius:8px; padding:2px; gap:2px; flex-shrink:0; }
.yms {
  border:none; background:transparent; cursor:pointer; font-family:inherit;
  font-size:11px; font-weight:700; color:var(--gray);
  padding:4px 9px; border-radius:6px; transition:all .12s;
}
.yms:hover { color:var(--ink); }
.ymsOk  { background:var(--green); color:#fff; }
.ymsDeg { background:var(--red);   color:#fff; }
.yillik-hist-row {
  display:flex; align-items:center; gap:8px;
  font-size:11px; color:var(--text2);
  padding:4px 0; border-bottom:0.5px solid rgba(0,0,0,.06);
}
.yillik-hist-row:last-child { border-bottom:none; }

.formGroup { display: flex; flex-direction: column; margin-top: 10px; }
.formLbl {
  display: block; font-size: 10px; font-weight: 700; color: var(--gray);
  text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 6px;
}
.formGroup .formLbl:first-child { margin-top: 0; }
.formInput {
  display: block; width: 100%; padding: 9px 12px; box-sizing: border-box;
  font-family: inherit; font-size: 13px; font-weight: 500;
  border: 0.5px solid rgba(255,255,255,.8); border-radius: 9px;
  background: rgba(255,255,255,.65); color: var(--ink); outline: none;
  transition: background .15s, box-shadow .15s;
}
.formInput::placeholder { color: rgba(110,110,115,.6); font-weight: 400; }
.formInput:focus { background: rgba(255,255,255,.95); box-shadow: 0 0 0 2.5px rgba(0,113,227,.2); }
.formRow2 { display: flex; gap: 8px; }
.formRow2 > div { flex: 1; min-width: 0; }
.formRow2 .formLbl { white-space: nowrap; }

.dangerZone { margin-top: 14px; padding-top: 10px; border-top: 0.5px solid var(--hairline); }
.ghostDanger {
  background: none; border: none; cursor: pointer; font-family: inherit;
  font-size: 11.5px; font-weight: 600; color: var(--red-deep); opacity: .7; padding: 3px 0;
}
.ghostDanger:hover { opacity: 1; text-decoration: underline; }
.confirmRow { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.confirmTxt { font-size: 13px; color: var(--red-deep); font-weight: 600; flex: 1; }
.confirmBtns { display: flex; gap: 8px; }
.confirmNo, .confirmYes {
  border: none; border-radius: 9px; padding: 7px 13px; font-family: inherit;
  font-size: 12.5px; font-weight: 700; cursor: pointer;
}
.confirmNo { background: rgba(120,120,128,.15); color: var(--ink); }
.confirmYes { background: var(--red); color: #fff; }

.toast-msg{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.88);backdrop-filter:blur(10px);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast-msg.toast-err{background:rgba(215,0,21,.88)}
.toast-msg.show{opacity:1}
@media (max-width: 640px) {
  .title { font-size: 22px; }
  .topInner { padding: 12px 14px 10px; }
  .grid { padding: 0 12px; gap: 9px; grid-template-columns: 1fr; margin-top: 14px; }
  .card { padding: 12px; }
  .statRow { gap: 10px; flex-wrap: wrap; }
  .ring { width: 48px; height: 48px; }
  .addBtn { padding: 9px 12px; }
  .addTxt { display: none; }
  .controls { gap: 8px; }
  .search { min-width: 100%; order: 2; }
  .segment { width: 100%; }
  .seg { flex: 1; padding: 7px 6px; font-size: 12.5px; }
  .overlay { align-items: flex-end; padding: 0; }
  .sheet {
    max-width: 100%; max-height: 92vh;
    border-radius: 24px 24px 0 0;
    padding: 10px 16px 24px;
    animation: slideUp .28s cubic-bezier(.32,1.15,.5,1);
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } }
  .grabber { display: block; width: 38px; height: 5px; border-radius: 3px; background: rgba(120,120,128,.3); margin: 0 auto 14px; }
  .checkRow { flex-wrap: wrap; }
  .miniSeg { margin-left: auto; }
  .saveBtn { min-width: 100%; }
  .delBtn { width: 100%; }
  .formRow2 { flex-direction: column; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen" style="position:fixed;inset:0;background:linear-gradient(160deg,#EEF1F6,#E8ECF3,#EDEAF2);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:-apple-system,sans-serif">
  <div style="width:44px;height:44px;border:3px solid rgba(0,113,227,.15);border-top-color:#0071E3;border-radius:50%;animation:spin .8s linear infinite"></div>
  <p style="color:#6E6E73;font-size:14px">Veriler yükleniyor…</p>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<!-- TOPBAR -->
<header class="topBar">
  <div class="topInner">
    <div class="titleRow">
      <div>
        <div class="eyebrow">FR.43.17 · Aylık Kontrol</div>
        <h1 class="title">Yangın Tüpleri</h1>
      </div>
      <div class="monthPicker">
        <button class="mBtn" onclick="changeMonth(-1)">‹</button>
        <span class="mLabel" id="mLabel">—</span>
        <button class="mBtn" onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="statRow">
      <div class="ring" id="ring" style="--p:0%"><span id="ringPct">0%</span></div>
      <div class="statText">
        <div class="statBig"><span id="statDone">0</span> <span class="statDim">/ <span id="statToplam">90</span> tüp kontrol edildi</span></div>
        <div class="statSub">
          <span class="dot ok"></span><span id="statOk">0</span> uygun &nbsp;
          <span class="dot sorun"></span><span id="statSorun">0</span> sorunlu &nbsp;
          <span class="dot bekliyor"></span><span id="statBekl">90</span> bekliyor
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="addBtn" style="background:rgba(120,120,128,.14);box-shadow:none;color:#0071E3" onclick="indir()" title="Raporu indir">
          <span style="font-size:15px">⬇</span><span class="addTxt">İndir</span>
        </button>
        <button class="addBtn" onclick="openNewSheet()">
          <span class="addPlus">+</span><span class="addTxt">Yeni tüp</span>
        </button>
      </div>
    </div>

    <div class="controls">
      <div class="segment">
        <button class="seg segOn" onclick="setFilter('hepsi',this)">Tümü</button>
        <button class="seg" onclick="setFilter('bekliyor',this)">Bekliyor</button>
        <button class="seg seg-ok" onclick="setFilter('ok',this)">Uygun</button>
        <button class="seg seg-sorun" onclick="setFilter('sorun',this)">Sorunlu</button>
      </div>
      <input class="search" placeholder="Ara — no veya yer" id="searchInput" oninput="renderGrid()">
    </div>
  </div>
</header>

<!-- GRID -->

async function fbLoadTupler() {
  try {
    const snap = await getDoc(doc(db,'config','tupler'));
    if(snap.exists() && snap.data().liste) return snap.data().liste;
  } catch(e) { console.warn('Tüpler yüklenemedi:',e); }
  return VARSAYILAN;
}
async function fbSaveTupler(l) {
  try { await setDoc(doc(db,'config','tupler'),{liste:l}); }
  catch(e) { console.error('Tüpler kaydedilemedi:',e); showToast('Kayıt hatası!','err'); }
}
async function fbLoadChecks() {
  try {
    // Tüm ayları çek ama normalize et: key'leri string'e çevir
    const snap = await getDocs(collection(db,'kontroller'));
    const result = {};
    snap.forEach(d=>{
      const raw = d.data().kayitlar||{};
      // Hem string hem number key'leri normalize et -> string key
      const normalized = {};
      for(const [k,v] of Object.entries(raw)) {
        normalized[String(k)] = v;
      }
      result[d.id] = normalized;
    });
    return result;
  } catch(e) { console.warn('Kontroller yüklenemedi:',e); return {}; }
}
async function fbLoadYillik() {
  try {
    const snap = await getDocs(collection(db,'yillik'));
    const result = {};
    snap.forEach(d=>{ result[d.id]=d.data(); }); // doc id = yil (örn "2026")
    return result;
  } catch(e) { console.warn('Yıllık yüklenemedi:',e); return {}; }
}
async function fbSaveYillik(yil, data) {
  try { await setDoc(doc(db,'yillik',String(yil)), data); }
  catch(e) { console.error('Yıllık kaydedilemedi:',e); showToast('Kayıt hatası!','err'); }
}

async function fbSaveMonth(monthKey, monthData) {
  try {
    // Kayıt öncesi key'leri string'e normalize et
    const normalized = {};
    for(const [k,v] of Object.entries(monthData||{})) { normalized[String(k)]=v; }
    await setDoc(doc(db,'kontroller',monthKey),{kayitlar:normalized});
  }
  catch(e) { console.error('Ay kaydedilemedi:',e); showToast('Kayıt hatası!','err'); }
}

function sktDurum(skt) {
  if(!skt) return null;
  const p=skt.trim().toUpperCase().split(/\s+/);
  const mi=AY_IDX[p[0]]; const y=parseInt(p[1]);
  if(mi===undefined||isNaN(y)) return null;
  const now=new Date();
  const diff=(y-now.getFullYear())*12+(mi-now.getMonth());
  if(diff<0) return 'gecmis';
  if(diff<=3) return 'yaklasiyor';
  return null;
}

function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(k) { const[y,m]=k.split('-'); return `${AYLAR[+m-1]} ${y}`; }
function shiftMonth(k,d) { const[y,m]=k.split('-').map(Number); return monthKey(new Date(y,m-1+d,1)); }

function ayVerisi() { return checks[aktifAy]||{}; }

// Tüp bu ayda aktif mi? (ekleme tarihi <= aktif ay)
function tupAktifMi(t) {
  if (!t.eklemeTarihi) return true; // eski tüpler (seed) her zaman aktif
  return t.eklemeTarihi <= aktifAy;
}

function durumOf(no) { return ayVerisi()[String(no)]?.durum||'bekliyor'; }

function stats() {
  const aktif=tupler.filter(tupAktifMi);
  let ok=0,sorun=0;
  aktif.forEach(t=>{const d=durumOf(t.no);if(d==='ok')ok++;if(d==='sorun')sorun++;});
  return {ok,sorun,bekliyor:aktif.length-ok-sorun,toplam:aktif.length};
}

// ── RENDER HEADER ──
function renderHeader() {
  document.getElementById('mLabel').textContent = monthLabel(aktifAy);
  const s=stats(), done=s.ok+s.sorun, pct=s.toplam?Math.round(done/s.toplam*100):0;
  document.getElementById('statOk').textContent=s.ok;
  document.getElementById('statSorun').textContent=s.sorun;
  document.getElementById('statBekl').textContent=s.bekliyor;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statToplam').textContent=s.toplam;
  document.getElementById('ringPct').textContent=pct+'%';
  document.getElementById('ring').style.setProperty('--p', pct+'%');
}

// ── RENDER GRID ──
function renderGrid() {
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const av=ayVerisi();
  const filtered=tupler.filter(t=>{
    if(!tupAktifMi(t)) return false; // bu ayda henüz eklenmemiş
    const d=durumOf(t.no);
    if(filtre==='ok'&&d!=='ok') return false;
    if(filtre==='sorun'&&d!=='sorun') return false;
    if(filtre==='bekliyor'&&d!=='bekliyor') return false;
    if(q&&!`${t.no} ${t.yer||''} ${t.cins||''}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>a.no-b.no);

  const el=document.getElementById('grid');
  if(!filtered.length){el.innerHTML='<div class="empty">Bu filtreye uyan tüp yok.</div>';return;}

  el.innerHTML=filtered.map(t=>{
    const d=durumOf(t.no);
    const skt=sktDurum(t.skt);
    const mark=d==='ok'?'✓':d==='sorun'?'!':'›';
    const pills=(skt==='gecmis'?'<span class="pill pillRed">SKT geçmiş</span>':skt==='yaklasiyor'?'<span class="pill pillAmber">SKT yakın</span>':'');
    const imgSrc = TUP_IMG;
    return `<button class="card ${d}" onclick="openDetail(${t.no})">
      <div class="badge ${d}"><img class="badge-img" src="${imgSrc}" alt="tüp"><span class="badge-num">${t.no}</span></div>
      <div class="cardBody">
        <div class="cardLoc">${t.yer||'—'}</div>
        <div class="cardMeta"><span>${t.cins||'Cinsi belirtilmemiş'}</span>${pills}</div>
      </div>
      <div class="mark ${d}">${mark}</div>
    </button>`;
  }).join('');
}

function renderAll() { renderHeader(); renderGrid(); }

// ── DETAIL SHEET ──
function openDetail(no) {
  seciliNo=no; duzenleMode=false; silOnay=false;
  const t=tupler.find(x=>x.no===no);
  const mevcut=ayVerisi()[no]||null;
  sheetItems={};
  KALEMLER.forEach(k=>{sheetItems[k.key]=mevcut?.items?.[k.key]??true;});
  sheetDigerSorun=mevcut?.digerSorun??false;
  sheetNot=mevcut?.not??'';
  // Yıllık kontrol state
  const aktifYil = aktifAy.split('-')[0];
  const mevYillik = yillikChecks[aktifYil]?.[String(no)]||null;
  yillikDurum = mevYillik?.durum||null;
  yillikNot   = mevYillik?.not||'';
  taslak={yer:t.yer||'',cins:t.cins||'',dolum:t.dolum||'',skt:t.skt||''};
  renderDetailSheet();
  document.getElementById('detailOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}

function renderDetailSheet() {
  const t=tupler.find(x=>x.no===seciliNo);
  const mevcut=ayVerisi()[seciliNo]||null;
  const sktD=sktDurum(t.skt);
  const durumCls=mevcut?mevcut.durum:'bekliyor';
  const sorunVar=sheetDigerSorun||KALEMLER.some(k=>sheetItems[k.key]===false);

  let html='';

  if(!duzenleMode){
    html+=`<div class="sheetHead">
      <div class="badge big ${durumCls}">${t.no}</div>
      <div style="flex:1;min-width:0">
        <div class="sheetLoc">${t.yer||'—'}</div>
        <div class="sheetType">${t.cins||'Cinsi belirtilmemiş'}</div>
      </div>
      <button class="iconBtn" onclick="startEdit()" title="Düzenle">✎</button>
      <button class="closeBtn" onclick="closeDetail()">✕</button>
    </div>
    <div class="infoRow">
      <div class="infoBox"><span class="infoLbl">Dolum</span><span class="infoVal">${t.dolum||'—'}</span></div>
      <div class="infoBox"><span class="infoLbl">Son kullanma</span><span class="infoVal" style="${sktD==='gecmis'?'color:var(--red)':sktD==='yaklasiyor'?'color:var(--amber)':''}">${t.skt||'—'}</span></div>
    </div>
    ${sktD==='gecmis'?'<div class="warnBand">Son kullanma tarihi geçmiş — dolum / değişim planlanmalı.</div>':''}
    ${renderYillikBand()}
    <div class="secTitle">${monthLabel(aktifAy)} aylık kontrolü</div>
    <div class="checkGroup">
      ${KALEMLER.map(k=>`
        <div class="checkRow">
          <span class="checkLbl">${k.label}</span>
          <div class="miniSeg">
            <button class="ms ${sheetItems[k.key]===true?'msOk':''}" onclick="setItem('${k.key}',true)">Uygun</button>
            <button class="ms ${sheetItems[k.key]===false?'msBad':''}" onclick="setItem('${k.key}',false)">Sorunlu</button>
          </div>
        </div>`).join('')}
      <div class="checkRow">
        <span class="checkLbl">Başka bir sorun var</span>
        <div class="miniSeg">
          <button class="ms ${!sheetDigerSorun?'msOk':''}" onclick="setDiger(false)">Hayır</button>
          <button class="ms ${sheetDigerSorun?'msBad':''}" onclick="setDiger(true)">Evet</button>
        </div>
      </div>
    </div>
    <textarea class="note" rows="2" placeholder="Not (isteğe bağlı) — ör. manometre iğnesi kırmızıda…" id="sheetNot" oninput="sheetNot=this.value">${sheetNot}</textarea>
    <div class="btnRow">
      <button class="saveBtn ${sorunVar?'saveBad':'saveOk'}" onclick="saveDetail()">
        ${sorunVar?'Sorunlu olarak kaydet':'Kontrol edildi olarak kaydet'}
      </button>
      ${mevcut?'<button class="delBtn" onclick="silAyKaydi()">Ay kaydını sil</button>':''}
    </div>`;

    // Yıllık kontrol geçmişi
    const yillikGeçmis = Object.entries(yillikChecks)
      .filter(([y,d])=>d[String(seciliNo)])
      .sort((a,b)=>b[0].localeCompare(a[0]));
    if(yillikGeçmis.length){
      html+=`<div class="secTitle">Yıllık kontrol geçmişi</div><div style="background:rgba(255,255,255,.5);border-radius:9px;padding:8px 11px;border:0.5px solid rgba(255,255,255,.7)">`;
      yillikGeçmis.forEach(([yil,data])=>{
        const k=data[String(seciliNo)];
        const renk=k.durum==='uygun'?'color:var(--green)':'color:var(--red)';
        const ikon=k.durum==='uygun'?'✓':'✗';
        html+=`<div class="yillik-hist-row">
          <span style="font-weight:700;${renk}">${ikon}</span>
          <span style="font-weight:600">${yil}</span>
          <span style="${renk};font-weight:600">${k.durum==='uygun'?'Uygun':'Uygun Değil'}</span>
          <span style="flex:1">${k.not||''}</span>
          <span style="color:var(--gray)">${k.tarih?new Date(k.tarih).toLocaleDateString('tr-TR'):''}</span>
        </div>`;
      });
      html+=`</div>`;
    }

    // Geçmiş
    const t_ekleme=(tupler.find(x=>x.no===seciliNo)||{}).eklemeTarihi||null;
  const gecmisKayitlar=Object.keys(checks).filter(m=>{
    if(!checks[m]?.[String(seciliNo)]) return false;
    if(t_ekleme && m < t_ekleme) return false; // ekleme tarihinden önceki ayları gizle
    return true;
  }).sort().reverse();
    html+=`<div class="secTitle">Geçmiş kontroller</div>`;
    if(!gecmisKayitlar.length){
      html+='<div class="histEmpty">Bu tüp için henüz kayıtlı kontrol yok.</div>';
    } else {
      html+=`<div class="histList">${gecmisKayitlar.map(m=>{
        const k=checks[m][String(seciliNo)];
        const bozuk=KALEMLER.filter(kk=>k.items?.[kk.key]===false).map(kk=>kk.label);
        if(k.digerSorun) bozuk.push('Diğer sorun');
        return `<div class="histRow">
          <span class="dot ${k.durum}" style="margin-top:6px"></span>
          <div style="flex:1;min-width:0">
            <div class="histMonth">${monthLabel(m)}<span class="${k.durum==='ok'?'histOk':'histBad'}">${k.durum==='ok'?'Sorun yok':'Sorunlu'}</span></div>
            ${bozuk.length?`<div class="histIssues">${bozuk.join(' · ')}</div>`:''}
            ${k.not?`<div class="histNote">"${k.not}"</div>`:''}
          </div>
          <div class="histDate">${k.tarih?new Date(k.tarih).toLocaleDateString('tr-TR'):''}</div>
        </div>`;
      }).join('')}</div>`;
    }

    // Danger zone
    html+=`<div class="dangerZone">`;
    if(!silOnay){
      html+=`<button class="ghostDanger" onclick="askSil()">Bu tüpü kalıcı olarak sil</button>`;
    } else {
      html+=`<div class="confirmRow">
        <span class="confirmTxt">Emin misin? Tüm geçmiş kayıtları da silinecek.</span>
        <div class="confirmBtns">
          <button class="confirmNo" onclick="cancelSil()">Vazgeç</button>
          <button class="confirmYes" onclick="doSil()">Evet, sil</button>
        </div>
      </div>`;
    }
    html+=`</div>`;

  } else {
    // Düzenleme modu
    html+=`<div class="sheetHead">
      <div class="badge big bekliyor"><img class="badge-img" src="${TUP_IMG}" alt="tüp" style="width:24px;height:24px"></div>
      <div style="flex:1;min-width:0"><div class="sheetLoc">Tüpü düzenle</div><div class="sheetType">No: ${t.no}</div></div>
      <button class="closeBtn" onclick="cancelEdit()">✕</button>
    </div>
    <div class="formGroup">
      <label class="formLbl">Bulunduğu yer</label>
      <input class="formInput" value="${taslak.yer}" oninput="setTaslakField('yer',this.value)" placeholder="Örn. ÜST KAT ORTA KOLON">
      <label class="formLbl">Cinsi / kapasitesi</label>
      <input class="formInput" value="${taslak.cins}" oninput="setTaslakField('cins',this.value)" placeholder="Örn. 6 KG KURU TOZ">
      <div class="formRow2">
        <div>
          <label class="formLbl">Dolum tarihi</label>
          ${ayYilSecici('dolum', taslak.dolum)}
        </div>
        <div>
          <label class="formLbl">Son kullanma tarihi</label>
          ${ayYilSecici('skt', taslak.skt)}
        </div>
      </div>
    </div>
    <div class="btnRow">
      <button class="saveBtn saveOk" onclick="saveEdit()">Değişiklikleri kaydet</button>
      <button class="delBtn" onclick="cancelEdit()">Vazgeç</button>
    </div>`;
  }

  document.getElementById('sheetContent').innerHTML=html;
}

function cancelEdit() { duzenleMode=false; renderDetailSheet(); }

async function saveEdit() {
  tupler=tupler.map(t=>t.no===seciliNo?{...t,yer:taslak.yer.trim(),cins:taslak.cins.trim()||null,dolum:taslak.dolum.trim()||null,skt:taslak.skt.trim()||null}:t);
  await fbSaveTupler(tupler);
  showToast('✓ Tüp güncellendi');
  duzenleMode=false; renderDetailSheet(); renderAll();
}

async function saveDetail() {
  sheetNot=document.getElementById('sheetNot')?.value||sheetNot;
  const sorunVar=sheetDigerSorun||KALEMLER.some(k=>sheetItems[k.key]===false);
  if(!checks[aktifAy]) checks[aktifAy]={};
  checks[aktifAy][String(seciliNo)]={durum:sorunVar?'sorun':'ok',items:{...sheetItems},digerSorun:sheetDigerSorun,not:sheetNot.trim(),tarih:new Date().toISOString()};
  await fbSaveMonth(aktifAy, checks[aktifAy]||{});
  showToast('✓ Kaydedildi');
  closeDetail(); renderAll();
}

async function silAyKaydi() {
  if(checks[aktifAy]) { delete checks[aktifAy][String(seciliNo)]; await fbSaveMonth(aktifAy, checks[aktifAy]||{}); }
  closeDetail(); renderAll();
}

async function doSil() {
  tupler=tupler.filter(t=>t.no!==seciliNo);
  await fbSaveTupler(tupler);
  const monthUpdates=[];
  Object.keys(checks).forEach(m=>{if(checks[m]&&checks[m][seciliNo]){delete checks[m][seciliNo];monthUpdates.push(fbSaveMonth(m,checks[m]||{}));}});
  await Promise.all(monthUpdates);
  showToast('✓ Tüp silindi');
  closeDetail(); renderAll();
}

  document.getElementById('detailOverlay').classList.remove('show');
  document.body.style.overflow=''; seciliNo=null;

  const maxNo=tupler.reduce((m,t)=>Math.max(m,t.no),0);

const TR_AYLAR = ['OCAK','ŞUBAT','MART','NİSAN','MAYIS','HAZİRAN','TEMMUZ','AĞUSTOS','EYLÜL','EKİM','KASIM','ARALIK'];

function ayYilSecici(field, mevcut) {
  // "OCAK 2025" → {ay:'OCAK', yil:'2025'}
  const parts = (mevcut||'').trim().split(/\s+/);
  const secAy  = TR_AYLAR.includes(parts[0]) ? parts[0] : '';
  const secYil = parts[1] || '';
  const ayOpts = TR_AYLAR.map(a=>`<option value="${a}" ${a===secAy?'selected':''}>${a}</option>`).join('');
  return `<div style="display:flex;gap:5px">
    <select class="formInput" style="flex:1.4" onchange="updateTaslakTarih('${field}','ay',this.value)">
      <option value="">Ay seç</option>${ayOpts}
    </select>
    <input class="formInput" style="flex:1;min-width:60px" type="number" min="2000" max="2099"
      value="${secYil}" placeholder="Yıl"
      oninput="updateTaslakTarih('${field}','yil',this.value)">
  </div>`;
}

function updateTaslakTarih(field, part, val) {
  // taslak.dolum veya taslak.skt güncelle
  const cur = (taslak[field]||'').trim().split(/\s+/);
  let ay   = TR_AYLAR.includes(cur[0]) ? cur[0] : '';
  let yil  = cur[1] || '';
  if(part === 'ay')  ay  = val;
  if(part === 'yil') yil = val;
  taslak[field] = (ay && yil) ? `${ay} ${yil}` : (ay || yil || '');
}

window.updateTaslakTarih = updateTaslakTarih;

// ── İNDİR (PDF raporu) ──
function indir() {
  const ay = monthLabel(aktifAy);
  const av = checks[aktifAy] || {};
  const aktifTupler = tupler.filter(tupAktifMi);
  const aktifYil = aktifAy.split('-')[0];
  const yillikAy = yillikChecks[aktifYil] || {};

  const rows = aktifTupler.map(t => {
    const k = av[String(t.no)] || null;
    const durum = k ? k.durum : 'bekliyor';
    const durumLabel = durum === 'ok' ? 'Uygun' : durum === 'sorun' ? 'Sorunlu' : 'Bekliyor';
    const durumColor = durum === 'ok' ? '#248A3D' : durum === 'sorun' ? '#D70015' : '#6E6E73';
    const rowBg = durum === 'sorun' ? 'rgba(255,59,48,.06)' : 'transparent';
    const sktCls = sktDurum(t.skt);
    const sktColor = sktCls === 'gecmis' ? '#D70015' : sktCls === 'yaklasiyor' ? '#B25000' : '#1D1D1F';
    let sorunDetay = '—';
    if (k && durum === 'sorun') {
      const bozuk = KALEMLER.filter(kk => k.items?.[kk.key] === false).map(kk => kk.label);
      if (k.digerSorun) bozuk.push('Diğer sorun');
      sorunDetay = (bozuk.join(' · ') || 'Belirtilmemiş') + (k.not ? ` — "${k.not}"` : '');
    }
    const yk = yillikAy[String(t.no)];
    const yillikLabel = yk ? (yk.durum === 'uygun' ? 'Uygun' : 'Uygun Değil') : '—';
    const yillikColor = yk ? (yk.durum === 'uygun' ? '#248A3D' : '#D70015') : '#6E6E73';
    return { no: t.no, yer: t.yer || '—', cins: t.cins || 'Belirtilmemiş', dolum: t.dolum || '—',
      sktDisplay: t.skt || '—', sktColor, durumLabel, durumColor, rowBg, sorunDetay, yillikLabel, yillikColor };
  });

  const ok = rows.filter(r => r.durumLabel === 'Uygun').length;
  const sorun = rows.filter(r => r.durumLabel === 'Sorunlu').length;
  const bekliyor = rows.length - ok - sorun;
  const pct = rows.length ? Math.round((ok + sorun) / rows.length * 100) : 0;
  const sorunlular = rows.filter(r => r.durumLabel === 'Sorunlu');
  const tarihStr = new Date().toLocaleDateString('tr-TR');

  const rowsHtml = rows.map(r => `
    <tr style="border-bottom:0.5px solid rgba(0,0,0,.08);background:${r.rowBg}">
      <td style="padding:5px 4px;font-weight:700;color:#6E6E73">${r.no}</td>
      <td style="padding:5px 4px;font-weight:600">${r.yer}</td>
      <td style="padding:5px 4px;color:#6E6E73">${r.cins}</td>
      <td style="padding:5px 4px;color:#6E6E73">${r.dolum}</td>
      <td style="padding:5px 4px;font-weight:600;color:${r.sktColor}">${r.sktDisplay}</td>
      <td style="padding:5px 4px;font-weight:700;color:${r.durumColor}">${r.durumLabel}</td>
      <td style="padding:5px 4px;color:#D70015">${r.sorunDetay}</td>
      <td style="padding:5px 4px;font-weight:600;color:${r.yillikColor}">${r.yillikLabel}</td>
    </tr>`).join('');

  const sorunHtml = sorunlular.length ? `
    <div style="margin-top:14px;padding:10px 12px;border:1px solid rgba(255,59,48,.3);border-radius:8px;background:rgba(255,59,48,.05)">
      <div style="font-size:11px;font-weight:700;color:#D70015;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Sorunlu Tüpler — Aksiyon Gerekli</div>
      ${sorunlular.map(s => `<div style="display:flex;gap:8px;font-size:11.5px;padding:4px 0;border-bottom:0.5px solid rgba(255,59,48,.15)">
        <span style="font-weight:700;width:26px;flex-shrink:0">#${s.no}</span>
        <span style="flex:1;min-width:0"><strong>${s.yer}</strong> — ${s.sorunDetay}</span>
      </div>`).join('')}
    </div>` : '';

  const html = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8">
  <title>Yangın Tüpü Kontrol Raporu — ${ay}</title>
  <style>
    @page { size: A4; margin: 14mm; }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;color:#1D1D1F;margin:0}
    table{border-collapse:collapse;width:100%}
    thead{display:table-header-group}
    tr{break-inside:avoid}
    .head{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:10px;border-bottom:1.5px solid #1D1D1F;margin-bottom:14px}
  </style></head><body>
  <div class="head">
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#6E6E73">FR.43.17 · Aylık Kontrol Formu</div>
      <div style="font-size:20px;font-weight:700;letter-spacing:-.3px">Yangın Tüpü Kontrol Raporu</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:15px;font-weight:700;color:#0071E3">${ay}</div>
      <div style="font-size:10px;color:#6E6E73;margin-top:2px">Oluşturulma: ${tarihStr}</div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div style="border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:10px 12px">
      <div style="font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#6E6E73">Toplam Tüp</div>
      <div style="font-size:24px;font-weight:700;margin-top:3px">${rows.length}</div>
    </div>
    <div style="border:1px solid rgba(52,199,89,.35);border-radius:8px;padding:10px 12px;background:rgba(52,199,89,.06)">
      <div style="font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#248A3D">Uygun</div>
      <div style="font-size:24px;font-weight:700;margin-top:3px;color:#248A3D">${ok}</div>
    </div>
    <div style="border:1px solid rgba(255,59,48,.35);border-radius:8px;padding:10px 12px;background:rgba(255,59,48,.06)">
      <div style="font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#D70015">Sorunlu</div>
      <div style="font-size:24px;font-weight:700;margin-top:3px;color:#D70015">${sorun}</div>
    </div>
    <div style="border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:10px 12px">
      <div style="font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#6E6E73">Bekliyor</div>
      <div style="font-size:24px;font-weight:700;margin-top:3px;color:#6E6E73">${bekliyor}</div>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:8px 12px;border:1px solid rgba(0,0,0,.1);border-radius:8px;font-size:11px">
    <span style="color:#6E6E73">Kontrol tamamlanma oranı</span>
    <span style="font-weight:700;color:#0071E3">%${pct}</span>
  </div>
  ${sorunHtml}
  <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#6E6E73;margin:16px 0 6px">Tüp Bazında Kontrol Listesi</div>
  <table style="font-size:9.5px">
    <thead><tr style="border-bottom:1.5px solid #1D1D1F">
      <th style="padding:5px 4px;width:22px;text-align:left">No</th>
      <th style="padding:5px 4px;text-align:left">Bulunduğu Yer</th>
      <th style="padding:5px 4px;text-align:left">Cins / Kapasite</th>
      <th style="padding:5px 4px;width:60px;text-align:left">Dolum</th>
      <th style="padding:5px 4px;width:70px;text-align:left">SKT</th>
      <th style="padding:5px 4px;width:56px;text-align:left">Durum</th>
      <th style="padding:5px 4px;text-align:left">Sorun Detayı</th>
      <th style="padding:5px 4px;width:64px;text-align:left">Yıllık Kontrol</th>
    </tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table>
  </body></html>`;

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  w.onload = () => { w.focus(); w.print(); };
  showToast('✓ Rapor açıldı, PDF olarak kaydedebilirsiniz');
}
window.indir = indir;

window.askSil=askSil; window.cancelSil=cancelSil; window.doSil=doSil;

async function seedIfEmpty() {
  try {
    const snap = await getDocs(collection(db,'kontroller'));
    // Mevcut ay key'lerini topla
    const mevcutAylar = new Set();
    snap.forEach(d => mevcutAylar.add(d.id));

    // Seed'deki aylardan eksik olanları veya boş olanları yaz
    const writes = [];
    for(const [mk, kayitlar] of Object.entries(SEED_CHECKS)) {
      if(!mevcutAylar.has(mk)) {
        // Normalize: tüm key'leri string yap
        const normalized = {};
        for(const [k,v] of Object.entries(kayitlar)) normalized[String(k)]=v;
        writes.push(setDoc(doc(db,'kontroller',mk), {kayitlar:normalized}));
        console.log('Seed yazılıyor:', mk);
      }
    }
    if(writes.length > 0) {
      await Promise.all(writes);
      console.log('Seed tamamlandı:', writes.length, 'ay yazıldı');
    } else {
      console.log('Seed: tüm aylar zaten mevcut');
    }
  } catch(e) { console.warn('Seed hatası:', e); }
}

(async () => {
  try {
    // Tüpler ve seed paralel, ama checks seed bittikten sonra
    [tupler] = await Promise.all([fbLoadTupler(), seedIfEmpty()]);
    [checks, yillikChecks] = await Promise.all([fbLoadChecks(), fbLoadYillik()]);
  } catch(e) {
    console.error('Yükleme hatası:',e);
    tupler = VARSAYILAN; checks = {};
  }
  document.getElementById('loadingScreen').style.display='none';
  renderAll();
})();
